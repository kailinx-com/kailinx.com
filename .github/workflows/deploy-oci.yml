name: Deploy OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/events-dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  deploy:
    runs-on: ubuntu-latest
    needs: [build-web, build-dashboard, build-api]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          command_timeout: 45m
          script: |
            cd /opt/kailinx.com
            cat > .env <<'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EVENTS_INTERNAL_TOKEN=${{ secrets.EVENTS_INTERNAL_TOKEN }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            ENVEOF

            if [ -z "${{ secrets.GRAFANA_ADMIN_USER }}" ] || [ -z "${{ secrets.GRAFANA_ADMIN_PASSWORD }}" ]; then
              echo "Missing required secret(s): GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD" >&2
              exit 1
            fi
            # Use the same username/password scheme for nginx basic auth (analytics/api/grafana gateway)
            # and Grafana app login by deriving htpasswd from Grafana secrets.
            printf "%s:%s\n" "${{ secrets.GRAFANA_ADMIN_USER }}" "$(openssl passwd -apr1 "${{ secrets.GRAFANA_ADMIN_PASSWORD }}")" > infra/nginx/.htpasswd

            login_ok=false
            for i in 1 2 3; do
              if echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
                login_ok=true
                break
              fi
              sleep 5
            done
            if [ "$login_ok" != "true" ]; then
              echo "GHCR login failed after retries" >&2
              exit 1
            fi

            pull_ok=false
            for i in 1 2 3; do
              if timeout 600 docker compose pull web events_dashboard api; then
                pull_ok=true
                break
              fi
              sleep 8
            done
            if [ "$pull_ok" != "true" ]; then
              echo "docker compose pull failed after retries" >&2
              exit 1
            fi

            # --wait blocks until api healthcheck passes (can exceed ~15 min cold JVM on small hosts).
            if ! docker compose --env-file .env up -d --wait --wait-timeout 2100; then
              echo "docker compose up --wait failed or timed out (Postgres vs secrets / api logs)" >&2
              docker compose --env-file .env logs --tail 200 api >&2 || true
              exit 1
            fi

            # Reload nginx in place (seconds) instead of restarting the whole container (~minute+).
            docker compose --env-file .env exec -T reverse_proxy nginx -s reload \
              || docker compose --env-file .env restart reverse_proxy

            # Prune in background so deploy does not block on GC.
            (docker image prune -f >/dev/null 2>&1 &) || true
