name: Deploy OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-web:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/events-dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd /opt/kailinx.com
            cat > .env <<'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EVENTS_INTERNAL_TOKEN=${{ secrets.EVENTS_INTERNAL_TOKEN }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            ENVEOF

            # Do not restart the Docker daemon here (slow, drops pulls). If OCI pulls are flaky,
            # set max-concurrent-downloads once on the host outside this script.

            login_ok=false
            for i in 1 2 3; do
              if echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
                login_ok=true
                break
              fi
              sleep 5
            done
            if [ "$login_ok" != "true" ]; then
              echo "GHCR login failed after retries" >&2
              exit 1
            fi

            pull_ok=false
            for i in 1 2 3; do
              if timeout 300 docker compose pull web events_dashboard api; then
                pull_ok=true
                break
              fi
              docker image prune -f || true
              sleep 8
            done
            if [ "$pull_ok" != "true" ]; then
              echo "docker compose pull failed after retries" >&2
              exit 1
            fi

            up_ok=false
            for i in 1 2 3; do
              if docker compose --env-file .env up -d; then
                up_ok=true
                break
              fi
              docker ps -a --format '{{.ID}} {{.Names}}' \
                | awk '/_kailinxcom-(web|events_dashboard|api)-1$/ {print $1}' \
                | xargs -r docker rm -f || true
              sleep 4
            done
            if [ "$up_ok" != "true" ]; then
              echo "docker compose up failed after retries" >&2
              exit 1
            fi

            sleep 3
            docker compose --env-file .env restart api
            # Reload nginx in place (seconds) instead of restarting the whole container (~minute+).
            docker compose --env-file .env exec -T reverse_proxy nginx -s reload \
              || docker compose --env-file .env restart reverse_proxy

            # Prune in background so deploy does not block on GC.
            (docker image prune -f >/dev/null 2>&1 &) || true

            smoke_ok=false
            for i in 1 2 3 4 5; do
              if docker compose --env-file .env exec -T reverse_proxy sh -c \
                'wget -T 3 -q -O /dev/null http://api:8080/actuator/health 2>/dev/null && wget -T 3 -q -O /dev/null http://web:3000 2>/dev/null'; then
                smoke_ok=true
                break
              fi
              echo "Smoke check $i/5 failed; retry in 3s..."
              sleep 3
            done
            if [ "$smoke_ok" != "true" ]; then
              echo "Internal smoke check failed after 5 attempts" >&2
              exit 1
            fi
