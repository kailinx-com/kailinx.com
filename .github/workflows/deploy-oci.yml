name: Deploy OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-web:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/events-dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            cd /opt/kailinx.com
            cat > .env <<'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EVENTS_INTERNAL_TOKEN=${{ secrets.EVENTS_INTERNAL_TOKEN }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            ENVEOF

            # Flaky OCI egress + concurrent layer downloads were causing short reads/timeouts.
            # Force serialized pulls at the daemon level before pulling.
            if [ ! -f /etc/docker/daemon.json ] || ! grep -q "max-concurrent-downloads" /etc/docker/daemon.json; then
              echo '{"max-concurrent-downloads": 1}' | sudo tee /etc/docker/daemon.json >/dev/null
              sudo systemctl restart docker
            fi

            login_ok=false
            for i in 1 2 3 4 5; do
              if echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin; then
                login_ok=true
                break
              fi
              sleep 10
            done
            if [ "$login_ok" != "true" ]; then
              echo "GHCR login failed after retries" >&2
              exit 1
            fi

            for svc in web events_dashboard api; do
              pull_ok=false
              for i in 1 2 3 4 5; do
                if timeout 240 docker compose pull "$svc"; then
                  pull_ok=true
                  break
                fi
                docker image prune -f || true
                sleep 15
              done
              if [ "$pull_ok" != "true" ]; then
                echo "docker compose pull failed for $svc after retries" >&2
                exit 1
              fi
            done

            up_ok=false
            for i in 1 2 3; do
              if docker compose --env-file .env up -d; then
                up_ok=true
                break
              fi
              # Recover from occasional stale temp container name conflicts during recreate.
              docker ps -a --format '{{.ID}} {{.Names}}' \
                | awk '/_kailinxcom-(web|events_dashboard|api)-1$/ {print $1}' \
                | xargs -r docker rm -f || true
              sleep 5
            done
            if [ "$up_ok" != "true" ]; then
              echo "docker compose up failed after retries" >&2
              exit 1
            fi
            # API may start before Postgres is fully ready; bounce once after stack is up.
            sleep 10
            docker compose --env-file .env restart api
            docker compose --env-file .env restart reverse_proxy
            docker image prune -f

            # Smoke test from host through nginx (TLS vhost; -k tolerates local/LetsEncrypt chain quirks on loopback).
            smoke_ok=false
            for i in 1 2 3 4 5 6; do
              protected_code="$(curl -k -sS -o /dev/null -w '%{http_code}' -I -H 'Host: api.kailinx.com' https://127.0.0.1/v1/events/top)"
              ingest_code="$(curl -k -sS -o /dev/null -w '%{http_code}' -X POST \
                -H 'Host: api.kailinx.com' \
                -H 'content-type: application/json' \
                https://127.0.0.1/v1/events \
                -d '{"events":[{"eventName":"deploy_smoke","happenedAt":"2026-04-27T00:00:00Z","page":"/","props":{}}]}')"
              if { [ "$protected_code" = "401" ] || [ "$protected_code" = "403" ]; } \
                && { [ "$ingest_code" = "202" ] || [ "$ingest_code" = "200" ]; }; then
                smoke_ok=true
                break
              fi
              echo "Host smoke attempt $i failed (protected=$protected_code, ingest=$ingest_code), retrying..."
              sleep 10
            done
            if [ "$smoke_ok" != "true" ]; then
              echo "Host smoke check failed after retries" >&2
              exit 1
            fi
