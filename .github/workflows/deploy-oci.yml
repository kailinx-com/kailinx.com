name: Deploy OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-web:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/events-dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-api:latest

      - name: Package deploy images artifact
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/kailinx-web:latest
          docker pull ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest
          docker pull ghcr.io/${{ github.repository_owner }}/kailinx-api:latest
          docker save \
            ghcr.io/${{ github.repository_owner }}/kailinx-web:latest \
            ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest \
            ghcr.io/${{ github.repository_owner }}/kailinx-api:latest \
            -o deploy-images.tar

      - name: Upload deploy images artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-images
          path: deploy-images.tar
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Download deploy images artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-images
          path: .

      - name: Copy deploy images to OCI
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: deploy-images.tar
          target: /tmp

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          command_timeout: 90m
          script: |
            cd /opt/kailinx.com
            cat > .env <<'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EVENTS_INTERNAL_TOKEN=${{ secrets.EVENTS_INTERNAL_TOKEN }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            ENVEOF
            docker load -i /tmp/deploy-images.tar
            rm -f /tmp/deploy-images.tar
            docker compose --env-file .env up -d
            docker image prune -f
