name: Deploy OCI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-web:latest

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/events-dashboard
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-analytics-dashboard:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/kailinx-api:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/kailinx.com
            cat > .env <<'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EVENTS_INTERNAL_TOKEN=${{ secrets.EVENTS_INTERNAL_TOKEN }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            ENVEOF
            for i in 1 2 3 4 5; do
              echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin && break
              sleep 10
            done
            for i in 1 2 3 4 5; do
              docker compose pull && break
              sleep 15
            done
            docker compose --env-file .env up -d
            docker image prune -f
