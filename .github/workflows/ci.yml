name: CI

on:
  pull_request:
  push:
    branches: ["main", "migration/containerized-stack"]

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/events-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build

  api-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: mvn -B -DskipTests package

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          EVENTS_INTERNAL_TOKEN=dummy \
          POSTGRES_PASSWORD=dummy \
          GRAFANA_ADMIN_USER=admin \
          GRAFANA_ADMIN_PASSWORD=dummy \
          docker compose config
