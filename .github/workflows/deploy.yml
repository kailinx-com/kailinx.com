name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bunx tsc --noEmit

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy on OCI host
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            mkdir -p ~/app/nginx/conf.d
            mkdir -p ~/app/certs

            export IMAGE_NAME=ghcr.io/${{ github.repository }}:latest
            docker pull "$IMAGE_NAME"

            echo "${{ secrets.SSL_CERT }}" > ~/app/certs/origin.pem
            echo "${{ secrets.SSL_KEY }}" > ~/app/certs/origin.key

            cat <<'EOF' > ~/app/docker-compose.yml
            services:
              proxy:
                image: nginx:alpine
                container_name: kailinx-gateway
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx/conf.d:/etc/nginx/conf.d
                  - ./certs:/etc/nginx/certs
                depends_on:
                  - portfolio
                restart: always
                networks:
                  - app-network

              portfolio:
                image: IMAGE_PLACEHOLDER
                container_name: kailinx-com
                restart: always
                networks:
                  - app-network

            networks:
              app-network:
                driver: bridge
            EOF

            sed -i '' "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" ~/app/docker-compose.yml || sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME|g" ~/app/docker-compose.yml

            cat <<'EOF' > ~/app/nginx/conf.d/default.conf
            server {
                listen 80;
                server_name kailinx.com www.kailinx.com;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl;
                server_name kailinx.com www.kailinx.com;

                ssl_certificate /etc/nginx/certs/origin.pem;
                ssl_certificate_key /etc/nginx/certs/origin.key;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;

                location / {
                    proxy_pass http://portfolio:80;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            EOF

            cd ~/app
            docker compose up -d --remove-orphans --force-recreate
            docker image prune -f
